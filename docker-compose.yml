services:
  app:
    build:
      context: .
      target: production
    image: artisancms:latest
    restart: unless-stopped
    volumes:
      - app_storage:/var/www/html/storage
      - app_content:/var/www/html/content
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-artisancms}
      - DB_USERNAME=${DB_USERNAME:-artisancms}
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=${CACHE_DRIVER:-file}
      - SESSION_DRIVER=${SESSION_DRIVER:-file}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - REDIS_HOST=${REDIS_HOST:-redis}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - artisancms

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/html/storage:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - artisancms

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-artisancms}
      MYSQL_USER: ${DB_USERNAME:-artisancms}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - artisancms

  worker:
    build:
      context: .
      target: production
    image: artisancms:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - app_storage:/var/www/html/storage
      - app_content:/var/www/html/content
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-artisancms}
      - DB_USERNAME=${DB_USERNAME:-artisancms}
      - DB_PASSWORD=${DB_PASSWORD}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
    depends_on:
      - app
      - db
    networks:
      - artisancms

  scheduler:
    build:
      context: .
      target: production
    image: artisancms:latest
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - app_storage:/var/www/html/storage
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-artisancms}
      - DB_USERNAME=${DB_USERNAME:-artisancms}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - app
      - db
    networks:
      - artisancms

volumes:
  db_data:
  app_storage:
  app_content:

networks:
  artisancms:
    driver: bridge
